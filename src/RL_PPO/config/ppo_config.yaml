# PPO Algorithm Configuration - Optimized for Stability

agent:
  learning_rate: 0.0001  # Reduced for stability
  gamma: 0.99
  epsilon_clip: 0.1  # Reduced for more conservative updates
  c1: 0.5  # Value loss coefficient
  c2: 0.05  # Increased entropy for better exploration
  max_grad_norm: 0.5
  hidden_dim: 256
  use_lr_scheduler: true
  entropy_decay: 0.995

training:
  total_episodes: 2000
  max_steps_per_episode: 500
  batch_size: 64
  update_epochs: 4  # Reduced to prevent overfitting
  save_interval: 100
  log_interval: 10
  gae_lambda: 0.95  # GAE lambda parameter
  use_real_ros: false  # Set to true to use real Gazebo environment

environment:
  map_size: 10.0
  num_obstacles: 20
  goal_tolerance: 0.5

deployment:
  max_linear_vel: 0.5
  max_angular_vel: 1.0
  control_frequency: 10.0